aid: wabco-holdings
name: WABCO Holdings
description: >-
  WABCO Holdings was a leading global supplier of technologies and services that improve
  the safety, efficiency, and connectivity of commercial vehicles. The company developed
  advanced braking, stability, suspension, and transmission automation systems. WABCO was
  acquired by ZF Friedrichshafen in 2020 and now operates as ZF's Commercial Vehicle
  Control Systems division, continuing to serve OEMs, fleets, and aftermarket customers
  worldwide with integrated telematics, fleet management, and vehicle safety technologies.
